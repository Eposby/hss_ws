# ROS-Gazebo Bridge Configuration
# Teknofest Hava Savunma Sistemi

# Camera image bridge
- ros_topic_name: "/hss/camera/image_raw"
  gz_topic_name: "/hss/camera"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

# Camera info
- ros_topic_name: "/hss/camera/camera_info"
  gz_topic_name: "/hss/camera/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS

# IMU data
- ros_topic_name: "/hss/imu"
  gz_topic_name: "/hss/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

# Joint states
- ros_topic_name: "/hss/turret/joint_states"
  gz_topic_name: "/hss/turret/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

# Pan joint command
- ros_topic_name: "/hss/turret/pan_cmd"
  gz_topic_name: "/hss/turret/pan_cmd"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

# Tilt joint command
- ros_topic_name: "/hss/turret/tilt_cmd"
  gz_topic_name: "/hss/turret/tilt_cmd"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

# Clock for synchronization
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS
